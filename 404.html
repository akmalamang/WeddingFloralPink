<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Simpan nama tamu dari path ke sessionStorage
      // lalu redirect ke halaman utama
      const path = window.location.pathname;
      sessionStorage.setItem('redirectPath', path);
      window.location.replace('/');
    </script>
  </head>
</html>
